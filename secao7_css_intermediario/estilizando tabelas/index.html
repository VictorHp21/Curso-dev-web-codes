<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estilizando Tabelas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Estilizando Tabelas</h1>
    <table>
        <tr>
            <th>Código</th>
            <th>Produto</th>
            <th>Preço</th>
        </tr>

        <tr>
            <td class="code">001</td>
            <td>Notebook</td>
            <td class="num">R$ 2.500</td>
        </tr>
        <tr>
            <td class="code">002</td>
            <td>Tablet</td>
            <td class="num">R$ 1.500</td>
        </tr>
        <tr>
            <td class="code">003</td>
            <td>Iphone</td>
            <td class="num">R$ 3.500</td>
        </tr>
        <tr> 
            <td class="code">004</td>
            <td>Galaxy</td>
            <td class="num">R$ 1.520</td>
        </tr>
        <tr>
            <td class="code">005</td>
            <td>Nexus</td>
            <td class="num">R$ 2.550</td>
        </tr>
    </table>
</body>
</html>
