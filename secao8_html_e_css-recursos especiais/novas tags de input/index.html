<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novas tags de input HTML5</title>
</head>

<body>



    <form action="">
        <label for="nome">Nome</label>
        <input type="text" name="nome" id="nome">
        <br><br>

        <label for="e-mail">E-mail</label>
        <input type="email" id="e-mail" required placeholder="Digite seu e-mail">
        <br><br>

        <label for="cor">Escolha uma cor:</label>
        <input type="color">
        <br><br>

        <label for="data">Escolha uma data:</label>
        <input type="date">
        <br><br>

        <label for="data">Escolha uma data e horário:</label>
        <input type="datetime-local">
        <br><br>

        <label for="arquivo">Escolha um arquivo:</label>
        <input type="file">
        <br><br>

        <label for="mes">Escolha um mês:</label>
        <input type="month">
        <br><br>

        <label for="numero">Escolha um número:</label>
        <input type="number">
        <br><br>

        <label for="telefone">Telefone:</label>
        <input type="tel">
        <br><br>

        <label for="url">URL:</label>
        <input type="url" placeholder="ex: http://www...">
        <br><br>

        <label for="pesquisa">Pesquisa:</label>
        <input type="search">
        <br><br>

        <label for="senha">Senha:</label>
        <input type="password">
        <br><br>

        <label for="range">Range:</label>
        <input type="range">
        <br><br>

      


        <input type="submit" value="Enviar">
    </form>

</body>

</html>
