<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animações</title>
    <style>
        /*animações*/

        /*lembrar dos prefixos webkit e moz para navegadores
        com versões mais antigas*/

        @keyframes animacao-caixa{
            from { /*estado inicial*/
                background: red;
                border-radius: 0px;
                top: 0;
                left: 0;
            }
            to { /*estado final*/
                background: yellow;
                border-radius: 300px;
                top: 200px;
                left: 200px;
            }
        }


        #caixa{
            position: absolute;
            width: 300px;
            height: 300px;
            background: red;
            animation-name: animacao-caixa;
            animation-duration: 2s;
            animation-delay: 1s;
            animation-iteration-count: infinite;
            animation-direction: alternate;

            /*Prefixos*/
            /*animation: animacao-caixa 2s 1s infinite alternate;*/
            /*webkit-animation: animacao-caixa 2s 1s infinite alternate;*/
            /*moz-animation: animacao-caixa 2s 1s infinite alternate;*/
        }


    </style>
</head>
<body>
    <div id="caixa">

    </div>
</body>
</html>
