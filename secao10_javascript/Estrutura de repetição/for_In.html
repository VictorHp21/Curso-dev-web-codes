<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript -  For In</title>
</head>
<body>

    

    <script>
        //var listaConvidados = ['Jorge', 'Jamilton', 'Jose', 'Ana', 'Maria']

        var listaConvidados = Array()

        listaConvidados['a'] = 'Jorge'
        listaConvidados[10] = 'Jose'
        listaConvidados['zebra'] = 'Ana'
        listaConvidados[-1] = 'Maria'
        listaConvidados[true] = 'Jamilton'

        console.log(listaConvidados)


        // bom para usar em arrays com indices variáveis

        for (var x in listaConvidados){
            console.log('Indice ' + x + ' valor: ' + listaConvidados[x])
        }

    </script>

    
</body>
</html>
