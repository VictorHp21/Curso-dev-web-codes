<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript - While</title>

    <script>

        var i = 1

        while(i <= 10){
             console.log(i)

            // if (i === 5){

               // continue // ppasa para uma nova verificação
            // } neste caso iria gerar um loop infinito

            if( i === 9){
                break // para interromper o while
            }

            i++
           
        }

         console.log(i)

    </script>

</head>
