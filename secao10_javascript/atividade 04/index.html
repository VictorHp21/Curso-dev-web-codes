<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript ex 04</title>

    <script>

        function acao(){
            document.getElementById('inp').style.background = "yellow"
        }

        function acaoF(){

            var x = document.getElementById('inp').value

            if(x.length < 3){
                document.getElementById('inp').style.background = "red"
            } else {
                document.getElementById('inp').style.background = "green"
            }

            
        }

    </script>
</head>
<body>
    
    <input type="text" id="inp" onblur="acaoF()" onfocus="acao()">

</body>
</html>
