<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript - BOM - parte 1</title>

    <script>

        //Syntax
                        //parametros opcionais
        // window.open(URL, name, specs, replace)


        var janela

        function abriPopUp(){
           janela = window.open('https://www.google.com', 'nova_janela', 'width=400, height=300')
        }

        function fecharPopup(){
            janela.close()
        }
    </script>
</head>
<body>
    
    <button onclick="abriPopUp()">Abrir janela</button>

    <button onclick="fecharPopup()">Fechar janela</button>

    <button onclick="window.print()">Imprimir página</button>

</body>
</html>
