<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript</title>

    <style>
        .estilo1{
            background-color: red;
            color: white;
        }

        .estilo2{
            background-color: rgb(114, 23, 212);
            color: black;
            width: 400px;
            height: 50px;
            text-align: center;
            font-size: 25px;
            padding: 25px;
        }
    </style>

    <script>
        function modificaClasse(){
            document.getElementById('msg').className = 'estilo2'
        }
    </script>

</head>
<body>
    
    <div id="msg" class="estilo1">
        Modificando a classe do elemento
        
    </div>

    <hr>

    <button type="button" onclick="modificaClasse()">Aplicar classe</button>

</body>
</html>
