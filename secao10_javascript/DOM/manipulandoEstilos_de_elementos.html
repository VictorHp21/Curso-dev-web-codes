<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript</title>

    <script>
        function mod(corDeFundo){
            document.getElementById('div').style.background = corDeFundo
        }
    </script>
</head>
<body>
    
    <h3>Manipulando estilo</h3>

   <button type="button" onclick="mod('#FF0000')">Vermelhor</button>
   <button type="button" onclick="mod('#00FF00')">Verde</button>
   <button type="button" onclick="mod('#0000FF')">Azul</button>

   <hr>

   <div id="div" style="border: 1px solid black; width: 100px; height: 100px;">

   </div>


</body>
</html>
