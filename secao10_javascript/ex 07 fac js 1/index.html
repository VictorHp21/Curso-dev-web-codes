<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudos JavaScript</title>
    <link rel="shortcut icon" href="https://2ality.com/2011/10/logo-js/js.jpg" type="image/x-icon">

    <!-- Bootstrap CSS Versão 4-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css"
        integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Albert+Sans:ital,wght@0,100..900;1,100..900&family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Great+Vibes&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Press+Start+2P&display=swap');

        :root {
            --font1: "Poppins", sans-serif;

            --color1: #F7DF1E;
        }


        body {
            background-color: black;
            height: 100vh;

            font-family: var(--font1);
        }

        h1 {
            color: white;
            text-align: center;
            font-size: 3em;
            padding: 7px;
        }

        h2 {
            color: gray;
            cursor: pointer;
            padding: 10px;

            transition: background 0.3s;
        }

        h2:hover {
            color: var(--color1);
        }

        p {
            display: none;
            padding: 10px;
        }

        input {
            align-content: center;
            background-color: black;
            color: white;
            border-radius: 5px;
        }

        button {
            border-radius: 5px;
            background-color: var(--color1);
            cursor: pointer;
        }

        button:hover {
            background-color: #7A0BC0;
        }

        span {
            display: block;
            color: white;
            font-size: 16px;
            padding: 5px;
        }

        #container {
            width: 600px;
            margin: 50px auto;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            padding: 20px;
            transition: transform 0.3s;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }


        #container::before {
            content: "";
            position: absolute;
            inset: 0;
            padding: 3px;
            border-radius: 20px;
            background: linear-gradient(45deg, #2E0249, #570A57, #7A0BC0, #9D00FF, #BF00FF);
            -webkit-mask:
                linear-gradient(#fff 0 0) content-box,
                linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }


        @keyframes gradiente {
            0% {
                background-position: 0% 50%;
            }

            100% {
                background-position: 100% 50%;
            }
        }

        #container::before {
            background-size: 300% 300%;
            animation: gradiente 4s linear infinite;
        }
    </style>

</head>

<body>



    <div id="container">

        <h1>Meus estudos de JavaScript</h1>

        <h2>Variáveis e Tipos</h2>
        <p>
            <input type="text" name="" id="nome" placeholder="Digite seu nome">
            <input type="text" id="idade" placeholder="Digite sua idade">
            <button onclick="enviarVari()">Enviar</button>
            <span id="variaveis"></span>
        </p>


        <h2>Operadores</h2>
        <p>
            <input type="number" name="" id="num1" placeholder="Digite um número">
            <input type="number" id="num2" placeholder="Digite outro número">
            <button onclick="enviarOpera()">Enviar</button>
            <span id="operacoes"></span>
        </p>
        <h2>Comparação</h2>
        <p>
            <input type="text" name="" id="v1" placeholder="Digite um valor">
            <input type="text" id="v2" placeholder="Digite outro valor">
            <button onclick="compara()">Enviar</button>
            <span id="comparacao"></span>
        </p>
        <h2 onclick="hora()">Condicionais</h2>
        <p>
            <span id="condicional"></span>
        </p>
        <h2>Repetição</h2>
        <p>
            <input type="number" name="" id="numRepete" placeholder="Digite um número">
            <button onclick="repetir()">Enviar</button>
            <span id="repetir"></span>
        </p>
        <h2 onclick="arrays()">Arrays</h2>
        <p>
            <span id="array"></span>
        </p>
        <h2>Funções</h2>
        <p>
            <span>Todo o código acima já esta usando funções onclick</span>
            
        </p>
        <h2>Orientação a Objetos</h2>
        <p>
            <span id="poo"></span>
        </p>

    </div>

    <br>
    <br>
    <br>


    <script>
        const titulos = document.querySelectorAll("h2")

        titulos.forEach(titulo => {
            titulo.addEventListener("click", () => {
                const paragrafo = titulo.nextElementSibling;
                paragrafo.style.display = paragrafo.style.display === "block" ? "none" : "block";
            })
        })

        // Variáveis e tipos

        function enviarVari() {

            const nome = document.getElementById('nome').value

            let idade = document.getElementById('idade').value

            if (nome === "" || idade === "") {
                alert("Por favor, preencha todos os campos!");
                return;
            }

            document.getElementById('variaveis').innerHTML = `<br>Olá ${nome}, vi que você tem ${idade} anos. <br> Seja bem vindo`

            document.getElementById('nome').value = ''
            document.getElementById('idade').value = ''
        }

        //Operadores

        function enviarOpera() {

            var num1 = Number(document.getElementById('num1').value)

            var num2 = Number(document.getElementById('num2').value)

            if (num1 == "" || num2 == "") {
                alert("Por favor, preencha todos os campos!");
                return;
            }

            let logica = (true && false);

            document.getElementById('operacoes').innerHTML = `A soma de ${num1} + ${num2} = ${num1 + num2} | Lógica (true && false): ${logica} `

            document.getElementById('num1').value = ''
            document.getElementById('num2').value = ''
        }

        // Comparação

        function compara() {

            let v1 = document.getElementById('v1').value;
            let v2 = document.getElementById('v2').value;

            const valorIgual = (Number(v1) == Number(v2));

            let tipo1 = isNaN(v1) ? "string" : "number";
            let tipo2 = isNaN(v2) ? "string" : "number";


            if (tipo1 === "number") v1 = Number(v1);
            if (tipo2 === "number") v2 = Number(v2);

            console.log(Number(v1), Number(v2));



            const tipoIgual = (typeof v1 === typeof v2);


            const resultado = `
          ${v1} == ${v2} (Valor igual): ${valorIgual}<br>
          ${v1} === ${v2} (Tipo e valor iguais): ${valorIgual && tipoIgual}<br>
          Tipo do valor 1: ${typeof v1} | Tipo do valor 2: ${typeof v2}
        `;

            document.getElementById('comparacao').innerHTML = resultado;
        }

        function hora() {
            

            const agora = new Date();
            const hora = agora.getHours();

            if (hora >= 5 && hora < 12) {
                document.getElementById('condicional').innerHTML = `Bom dia ☀️ <br>Hora atual: ${hora}`;
            } else if (hora >= 12 && hora < 18) {
                document.getElementById('condicional').innerHTML = `Boa tarde 🌞 <br>Hora atual: ${hora}`;
            } else {
                document.getElementById('condicional').innerHTML = `Boa noite 🌙 <br>Hora atual: ${hora}`;
            }
        }

        function repetir(){
            var num = document.getElementById('numRepete').value

            document.getElementById('repetir').innerHTML = `Contando até ${num} <br>`

            for (var i = 1; i <= num; i++){
                 document.getElementById('repetir').innerHTML +=  ` ${i}`
            }
        }

        function arrays(){

            var listaPessoas = ['Ana', 'Pedro', 'Alice', 'Vagner', 'Marina Sena']

            listaPessoas.forEach(function(valor){
                document.getElementById('array').innerHTML += `${valor}, `
            })

        }


        // Orientação a objetos em js

        function objeto(){
            class Pessoa {
                construtor(n) {this.nome = n;}
                ola() {return "Olá, meu nome é" + this.nome}
            }

            const aluno = new Pessoa("Victor")

            document.getElementById('poo').innerHTML = `${aluno.ola() }`


        }



    </script>

</body>

</html>
