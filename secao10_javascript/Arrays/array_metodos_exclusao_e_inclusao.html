<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript</title>

    <script>

        var lista_frutas = Array()

        lista_frutas[0] = 'Maça'
        lista_frutas[1] = 'Banana'

        // adicionar elementos (inicio ou final)

        // no final

        lista_frutas.push('Uva')


        // no inicio

        lista_frutas.unshift('Pera')

        console.log(lista_frutas)

        // ecluir no final do array
        .pop()

        // excluir no inicio
        .shift()


    </script>

</head>
