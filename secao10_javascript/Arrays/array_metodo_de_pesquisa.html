<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript</title>

    <script>

        var lista_pessoas = Array()

        lista_pessoas[0] = 'Ana'
        lista_pessoas[1] = 'Raquel'
        lista_pessoas[2] = 'Felipe'
        lista_pessoas[3] = 'Joana'

        // para fazer uma pesquisa usamos indexof() --> retorna o indice

       console.log(lista_pessoas.indexOf('Raquel')) 

       lista_pessoas.push('Alyne') // a pesquisa sera -- caseSensitive

       if (lista_pessoas.indexOf('Alyne') === -1){
        console.log("Elemento não está na lista")
       } else {
        console.log("Elemento esta na lista na posição: " + lista_pessoas.indexOf('Alyne'))
       }

    </script>

</head>
<body>
    
</body>
</html>
